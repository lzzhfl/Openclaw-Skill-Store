spring:
  datasource:
    url: jdbc:h2:file:/data/skillstore;AUTO_SERVER=ON
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false

logging:
  level:
    com.openclaw.skillstore: INFO
