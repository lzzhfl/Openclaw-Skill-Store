services:
  # Frontend: React Static Site
  - type: static
    name: openclaw-skill-store-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://openclaw-skill-store-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # Backend: Spring Boot Docker Container
  - type: web
    name: openclaw-skill-store-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromService:
          name: openclaw-skill-store-db
          type: pserv
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://openclaw-skill-store-frontend.onrender.com

  # PostgreSQL Database
  - type: pserv
    name: openclaw-skill-store-db
    runtime: postgres
    plan: free
