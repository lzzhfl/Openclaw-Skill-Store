app = "openclaw-skill-store"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "fly"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "5s"
    method = "get"
    path = "/api/v1/health"

[mounts]
  source = "data"
  destination = "/data"
