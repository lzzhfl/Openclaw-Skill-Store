name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Blueprint to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Create or update Blueprint from render.yaml
          curl -s -X POST "https://api.render.com/v1/blueprints" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"repoUrl\": \"https://github.com/lzzhfl/Openclaw-Skill-Store\", \"branch\": \"$GITHUB_REF_NAME\"}" \
            | tee /tmp/render-response.json

          echo ""
          echo "Blueprint deployment triggered."
          echo "Check status at: https://dashboard.render.com"
